apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: piston-packages
  namespace: blog
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: piston
  namespace: blog
spec:
  selector:
    app: piston
  ports:
    - name: http
      port: 2000
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: piston
  namespace: blog
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: piston
  template:
    metadata:
      labels:
        app: piston
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      containers:
        - name: piston
          image: ghcr.io/engineer-man/piston:latest
          imagePullPolicy: Always
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -e
              enable_cgroup_controllers() {
                target="$1"
                shift
                missing=""
                current="$(cat "$target" 2>/dev/null || true)"
                for controller in "$@"; do
                  case " $current " in
                    *" $controller "*) ;;
                    *) missing="$missing +$controller" ;;
                  esac
                done
                if [ -n "$missing" ]; then
                  echo "${missing# }" > "$target"
                fi
              }
              CGROUP_FS=/sys/fs/cgroup
              if [ ! -e "$CGROUP_FS" ]; then
                echo "Cannot find $CGROUP_FS. Please make sure your system is using cgroup v2"
                exit 1
              fi
              if [ -e "$CGROUP_FS/unified" ]; then
                echo "Combined cgroup v1+v2 mode is not supported. Please make sure your system is using pure cgroup v2"
                exit 1
              fi
              if [ ! -e "$CGROUP_FS/cgroup.subtree_control" ]; then
                echo "Cgroup v2 not found. Please make sure cgroup v2 is enabled on your system"
                exit 1
              fi
              cd "$CGROUP_FS"
              mkdir -p isolate/init
              echo 1 > isolate/cgroup.procs
              enable_cgroup_controllers cgroup.subtree_control cpuset cpu io memory pids
              cd isolate
              echo 1 > init/cgroup.procs
              enable_cgroup_controllers cgroup.subtree_control cpuset memory
              echo "Initialized cgroup"
              chown -R piston:piston /piston
              exec su -- piston -c 'ulimit -n 65536 && node /piston_api/src'
          ports:
            - name: http
              containerPort: 2000
          # Upstream Piston documents privileged container execution, and upstream
          # isolate warns that containerized use is not recommended and probably
          # needs privileged mode. Keep the cluster manifest on that documented path
          # until a validated non-privileged profile exists.
          securityContext:
            privileged: true
          volumeMounts:
            - name: piston-packages
              mountPath: /piston/packages
            - name: piston-jobs
              mountPath: /piston/jobs
          startupProbe:
            exec:
              command:
                - node
                - -e
                - "require('http').get('http://127.0.0.1:2000/api/v2/runtimes',(res)=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))"
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            exec:
              command:
                - node
                - -e
                - "require('http').get('http://127.0.0.1:2000/api/v2/runtimes',(res)=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))"
            initialDelaySeconds: 20
            periodSeconds: 30
          livenessProbe:
            exec:
              command:
                - node
                - -e
                - "require('http').get('http://127.0.0.1:2000/api/v2/runtimes',(res)=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))"
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 1Gi
      volumes:
        - name: piston-packages
          persistentVolumeClaim:
            claimName: piston-packages
        - name: piston-jobs
          emptyDir:
            medium: Memory
            sizeLimit: 256Mi
