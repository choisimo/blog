apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: blog-platform
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/part-of: blog-gitops
spec:
  project: blog
  source:
    repoURL: https://github.com/choisimo/blog.git
    targetRevision: main
    path: k3s
  destination:
    server: https://kubernetes.default.svc
    namespace: blog
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
