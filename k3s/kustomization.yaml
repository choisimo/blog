apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - limitrange.yaml
  - resourcequota.yaml
  - configmap.yaml
  - postgres.yaml
  - redis.yaml
  - chromadb.yaml
  - surrealdb.yaml
  - open-notebook.yaml
  - api.yaml
  - ingress.yaml
  - middleware.yaml
  - piston.yaml
  - terminal-optional.yaml
  - terminal-ingress-optional.yaml

images:
  - name: ghcr.io/choisimo/blog-api
    newTag: latest
  - name: ghcr.io/choisimo/blog-terminal
    newTag: latest
  - name: ghcr.io/engineer-man/piston
    newTag: latest
  - name: lfnovo/open_notebook
    newTag: v1-latest
