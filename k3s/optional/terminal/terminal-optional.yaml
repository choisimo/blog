apiVersion: v1
kind: Service
metadata:
  name: terminal-server
  namespace: blog
spec:
  selector:
    app: terminal-server
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: terminal-server
  namespace: blog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: terminal-server
  template:
    metadata:
      labels:
        app: terminal-server
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      imagePullSecrets:
        - name: ghcr-creds
      containers:
        - name: dind
          image: docker:27-dind
          imagePullPolicy: Always
          args:
            - --host=unix:///var/run/docker.sock
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          securityContext:
            privileged: true
          volumeMounts:
            - name: docker-sock
              mountPath: /var/run
            - name: docker-graph
              mountPath: /var/lib/docker
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - docker info >/dev/null 2>&1
            failureThreshold: 30
            periodSeconds: 5
        - name: terminal-server
          image: ghcr.io/choisimo/blog-terminal:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: TERMINAL_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: blog-app-secrets
                  key: TERMINAL_SESSION_SECRET
            - name: TERMINAL_GATEWAY_URL
              valueFrom:
                configMapKeyRef:
                  name: blog-app-config
                  key: TERMINAL_GATEWAY_URL
            - name: TERMINAL_SESSION_TIMEOUT_MS
              valueFrom:
                configMapKeyRef:
                  name: blog-app-config
                  key: TERMINAL_SESSION_TIMEOUT_MS
            - name: SANDBOX_IMAGE
              valueFrom:
                configMapKeyRef:
                  name: blog-app-config
                  key: SANDBOX_IMAGE
            - name: DOCKER_HOST
              value: unix:///var/run/docker.sock
          volumeMounts:
            - name: docker-sock
              mountPath: /var/run
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - test -S /var/run/docker.sock
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 1Gi
      volumes:
        - name: docker-sock
          emptyDir:
            sizeLimit: 16Mi
        - name: docker-graph
          emptyDir:
            sizeLimit: 10Gi
