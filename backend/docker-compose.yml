# =============================================================================
# Blog Backend Docker Compose
# =============================================================================
# Backend API Server for blog-b.nodove.com
#
# Architecture:
#   noblog.nodove.com (Frontend) -> api.nodove.com (Workers) -> blog-b.nodove.com (This)
#
# Services:
#   - api:              Node.js Backend API Server
#   - nginx:            Reverse Proxy (SSL termination)
#   - terminal-server:  WebSocket Terminal Server
#   - workers-local:    Workers local emulator (wrangler dev)
#   - chromadb:         Vector Database for RAG
#   - redis:            Cache and async task queue
#
# Usage:
#   docker compose up -d                      # Start all services
#   docker compose up -d api nginx redis      # Start core services only
#   docker compose logs -f api                # View API logs
#
# Environment:
#   - Copy .env.example to .env and configure
#   - Required: AI_SERVER_URL, AI_API_KEY for AI features
#   - Required: SSL certificates in nginx/ssl/
#
# SSL Setup:
#   mkdir -p nginx/ssl
#   # Option 1: Self-signed (development)
#   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout nginx/ssl/origin.key -out nginx/ssl/origin.crt \
#     -subj "/CN=blog-b.nodove.com"
#   # Option 2: Cloudflare Origin Certificate (production)
#   # Download from Cloudflare Dashboard -> SSL/TLS -> Origin Server
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Backend API Server
  # ---------------------------------------------------------------------------
  api:
    image: ghcr.io/choisimo/blog-api:latest
    container_name: blog-api
    env_file: .env
    environment:
      - NODE_ENV=production
      - CHROMA_URL=http://chromadb:8000
      - SQLITE_PATH=/app/.data/blog.db
      - SQLITE_MIGRATIONS_DIR=/app/migrations
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://${POSTGRES_USER:-bloguser}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@postgres:5432/${POSTGRES_DB:-bloganalytics}
    volumes:
      - ../frontend/public:/frontend/public
      - ../.data:/app/.data
      - ../workers/migrations:/app/migrations:ro
    networks:
      - blog-network
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://127.0.0.1:5080/api/v1/healthz" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    labels:
      - "com.blog.service=api"
      - "com.blog.description=Backend API Server"
      - "com.centurylinklabs.watchtower.enable=true"

  # ---------------------------------------------------------------------------
  # Nginx Reverse Proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: blog-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
      - "8443:8443"
    networks:
      - blog-network
    depends_on:
      - api
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://127.0.0.1/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    labels:
      - "com.blog.service=nginx"
      - "com.blog.description=Reverse Proxy with SSL"

  # ---------------------------------------------------------------------------
  # Terminal Server (WebSocket)
  # ---------------------------------------------------------------------------
  terminal-server:
    image: ghcr.io/choisimo/blog-terminal:latest
    container_name: blog-terminal
    environment:
      - NODE_ENV=production
      - BACKEND_KEY=${BACKEND_KEY}
      - SANDBOX_IMAGE=${SANDBOX_IMAGE:-alpine:latest}
    networks:
      - blog-network
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    labels:
      - "com.blog.service=terminal"
      - "com.blog.description=WebSocket Terminal Server"
      - "com.centurylinklabs.watchtower.enable=true"

  # ---------------------------------------------------------------------------
  # Workers Local Emulator (Wrangler)
  # ---------------------------------------------------------------------------
  workers-local:
    image: blog-workers-local:latest
    build:
      context: ..
      dockerfile: workers/Dockerfile.local
    container_name: blog-workers-local
    env_file: .env
    environment:
      - BACKEND_ORIGIN=http://api:5080
    ports:
      - "127.0.0.1:8787:8787"
    networks:
      - blog-network
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    labels:
      - "com.blog.service=workers-local"
      - "com.blog.description=Workers local emulator (wrangler dev)"

  # ---------------------------------------------------------------------------
  # ChromaDB - Vector Database for RAG
  # ---------------------------------------------------------------------------
  chromadb:
    image: chromadb/chroma:latest
    container_name: blog-chromadb
    volumes:
      - chromadb-data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=false
      - ALLOW_RESET=false
    networks:
      - blog-network
    healthcheck:
      test: [ "CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8000 && echo -e \"GET /api/v2/heartbeat HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && timeout 5 cat <&3 | grep -q 200'" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    labels:
      - "com.blog.service=chromadb"
      - "com.blog.description=Vector Database for RAG"

  # ---------------------------------------------------------------------------
  # PostgreSQL - Analytics and logging database
  # REQUIRED: POSTGRES_PASSWORD must be set in .env (no default).
  #   postgres:16-alpine refuses to start with an empty POSTGRES_PASSWORD.
  #   If it is unset, both this service and `api` (depends_on: service_healthy)
  #   will fail to start. Set it in .env before running docker compose up.
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: blog-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-bloganalytics}
      - POSTGRES_USER=${POSTGRES_USER:-bloguser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - blog-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bloguser} -d ${POSTGRES_DB:-bloganalytics}" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    labels:
      - "com.blog.service=postgres"
      - "com.blog.description=PostgreSQL for analytics and logs"

  # ---------------------------------------------------------------------------
  # Redis - Caching and async task queue
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: blog-redis
    env_file: .env
    command: >-
      redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis-data:/data
    networks:
      - blog-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    labels:
      - "com.blog.service=redis"
      - "com.blog.description=Cache and Task Queue"

  # ---------------------------------------------------------------------------
  # SurrealDB - Database for Open Notebook
  # ---------------------------------------------------------------------------
  surrealdb:
    image: surrealdb/surrealdb:v2
    container_name: blog-surrealdb
    user: "0:0"
    command: start --user root --pass ${SURREALDB_ROOT_PASSWORD:-surrealdb} --bind 0.0.0.0:8000 rocksdb:/data/database.db
    volumes:
      - surrealdb-data:/data
    networks:
      - blog-network
    healthcheck:
      test: [ "CMD", "/surreal", "isready" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    labels:
      - "com.blog.service=surrealdb"
      - "com.blog.description=Database for Open Notebook"

  # ---------------------------------------------------------------------------
  # Open Notebook - Knowledge Management with RAG
  # ---------------------------------------------------------------------------
  open-notebook:
    image: lfnovo/open_notebook:v1-latest
    container_name: blog-open-notebook
    environment:
      # SurrealDB connection
      - SURREAL_URL=ws://surrealdb:8000/rpc
      - SURREAL_USER=root
      - SURREAL_PASSWORD=${SURREALDB_ROOT_PASSWORD:-surrealdb}
      - SURREAL_NAMESPACE=open_notebook
      - SURREAL_DATABASE=open_notebook
      # OpenAI-compatible API for LLM
      - DEFAULT_CHAT_MODEL=${OPEN_NOTEBOOK_CHAT_MODEL:-gpt-4.1}
      - DEFAULT_TRANSFORMATION_MODEL=${OPEN_NOTEBOOK_TRANSFORM_MODEL:-gpt-4.1}
      - OPENAI_API_KEY=${AI_API_KEY}
      - OPENAI_COMPATIBLE_BASE_URL=${AI_SERVER_URL:-https://api.openai.com/v1}
      - OPENAI_COMPATIBLE_API_KEY=${AI_API_KEY}
      - OPENAI_COMPATIBLE_BASE_URL_LLM=${AI_SERVER_URL:-https://api.openai.com/v1}
      - OPENAI_COMPATIBLE_API_KEY_LLM=${AI_API_KEY}
      - OPENAI_COMPATIBLE_BASE_URL_EMBEDDING=${AI_EMBEDDING_URL:-${AI_SERVER_URL:-https://api.openai.com/v1}}
      - OPENAI_COMPATIBLE_API_KEY_EMBEDDING=${AI_EMBEDDING_API_KEY:-${AI_API_KEY}}
      - OPENAI_API_BASE=${AI_SERVER_URL:-https://api.openai.com/v1}
      # Embedding configuration
      - DEFAULT_EMBEDDING_MODEL=${OPEN_NOTEBOOK_EMBED_MODEL:-multilingual-e5-large}
      - EMBEDDING_API_KEY=${AI_EMBEDDING_API_KEY:-${AI_API_KEY}}
      - EMBEDDING_API_BASE=${AI_EMBEDDING_URL:-${AI_SERVER_URL:-https://api.openai.com/v1}}
    ports:
      - "127.0.0.1:8501:8501"
    networks:
      - blog-network
    depends_on:
      surrealdb:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:5055/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    labels:
      - "com.blog.service=open-notebook"
      - "com.blog.description=Knowledge Management with RAG"

  # ---------------------------------------------------------------------------
  # Piston - Self-hosted Code Execution Engine
  # ---------------------------------------------------------------------------
  # Replaces the now-defunct public emkc.org/api/v2/piston API (whitelist-only since 2026-02-15).
  # Accessed internally via http://piston:2000 — never exposed to the internet.
  # Frontend calls /api/v1/execute (backend proxy) which forwards to this service.
  # ---------------------------------------------------------------------------
  piston:
    image: ghcr.io/engineer-man/piston:latest
    container_name: blog-piston
    privileged: true
    tmpfs:
      - /piston/jobs
    volumes:
      - piston-data:/piston/packages
    networks:
      - blog-network
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:2000/api/v2/runtimes || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    labels:
      - "com.blog.service=piston"
      - "com.blog.description=Self-hosted code execution engine"

  # ---------------------------------------------------------------------------
  # Watchtower - Automatic Container Updates from GHCR
  # ---------------------------------------------------------------------------
  # Prerequisites (run once on server before starting):
  #   ./scripts/setup-ghcr-auth.sh
  #   → Logs into ghcr.io and writes ~/.docker/config.json
  #
  # Manual on-demand update (via HTTP API):
  #   curl -H "Authorization: Bearer $WATCHTOWER_API_TOKEN" \
  #        http://localhost:8080/v1/update
  # ---------------------------------------------------------------------------
  watchtower:
    image: containrrr/watchtower:latest
    container_name: blog-watchtower
    environment:
      # Only update containers labelled with watchtower.enable=true
      - WATCHTOWER_LABEL_ENABLE=true
      # Poll GHCR for new image digests every 5 minutes
      - WATCHTOWER_POLL_INTERVAL=300
      # Remove superseded images to avoid disk bloat
      - WATCHTOWER_CLEANUP=true
      # Bring up the new container before stopping the old one (zero-downtime)
      - WATCHTOWER_ROLLING_RESTART=true
      # Skip stopped containers (they don't serve traffic)
      - WATCHTOWER_INCLUDE_STOPPED=false
      # Run pre/post-update lifecycle hooks if defined on containers
      - WATCHTOWER_LIFECYCLE_HOOKS=true
      # Log level: debug|info|warn|error
      - WATCHTOWER_LOG_LEVEL=info
      # Emit a structured update report to stdout after each check cycle
      - WATCHTOWER_NOTIFICATION_REPORT=true
      # HTTP API — allows on-demand update trigger via curl (no polling wait)
      - WATCHTOWER_HTTP_API_UPDATE=true
      - WATCHTOWER_HTTP_API_TOKEN=${WATCHTOWER_API_TOKEN:-changeme-set-in-env}
      # Allow the periodic poll even when HTTP API is enabled
      - WATCHTOWER_HTTP_API_PERIODIC_POLLS=true
      # Match the host Docker daemon API version to avoid client version negotiation errors
      - DOCKER_API_VERSION=1.47
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # GHCR credentials — generated by scripts/setup-ghcr-auth.sh
      # Uses $HOME so it works for both root and non-root docker users
      - ${HOME}/.docker/config.json:/config.json:ro
    ports:
      # HTTP API bound to localhost only — not exposed to the internet
      - "127.0.0.1:8080:8080"
    networks:
      - blog-network
    restart: unless-stopped
    labels:
      - "com.blog.service=watchtower"
      - "com.blog.description=Automatic container update from GHCR"

# =============================================================================
# Networks
# =============================================================================
networks:
  blog-network:
    name: blog-network
    driver: bridge

# =============================================================================
# Volumes
# =============================================================================
volumes:
  chromadb-data:
    name: blog-chromadb-data
  redis-data:
    name: blog-redis-data
  surrealdb-data:
    name: blog-surrealdb-data
  postgres-data:
    name: blog-postgres-data
  piston-data:
    name: blog-piston-data
