<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Page Not Found - nodove blog</title>
    <meta
      name="description"
      content="페이지를 찾을 수 없습니다. 홈페이지로 돌아가세요."
    />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/nodove.ico" />
    <script>
      // Preserve the original path so BrowserRouter can restore it on index.html
      (function () {
        var l = window.location;
        l.replace(
          l.protocol +
            "//" +
            l.hostname +
            (l.port ? ":" + l.port : "") +
            l.pathname.split("/").slice(0, 1).join("/") +
            "/?/" +
            l.pathname.slice(1).replace(/&/g, "~and~") +
            (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
            l.hash,
        );
      })();
    </script>
  </head>
  <body>
    <div
      style="
        text-align: center;
        padding: 50px;
        font-family:
          -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;
      "
    >
      <h1>404 - 페이지를 찾을 수 없습니다</h1>
      <p>오류 페이지를 복구하는 중...</p>
    </div>
  </body>
</html>
