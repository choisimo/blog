<!doctype html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>알고리즘 교체 과정 추적</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            margin: 0;
            padding: 16px;
            min-height: 100vh;
        }

        .panel {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        .panel-header {
            font-size: 0.875rem;
            font-weight: 600;
            color: #64748b;
            border-bottom: 1px solid #e2e8f0;
            padding: 12px 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn {
            padding: 6px 12px;
            font-size: 0.875rem;
            font-weight: 500;
            border-radius: 6px;
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.15s;
            background-color: #2563eb;
            color: white;
            width: 100%;
            white-space: nowrap;
        }

        .btn:hover:not(:disabled) {
            background-color: #1d4ed8;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .input-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .input-text,
        .select-sm {
            padding: 6px 10px;
            font-size: 0.875rem;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            outline: none;
            background: white;
            width: 100%;
            font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
        }

        .select-sm {
            font-family: inherit;
        }

        .input-text:focus,
        .select-sm:focus {
            border-color: #2563eb;
        }

        .mono {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        }

        .history-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 12px;
            min-height: 140px;
        }

        .history-container::-webkit-scrollbar {
            height: 6px;
        }

        .history-container::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        .history-container::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        .col {
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: center;
            min-width: 32px;
            animation: slideIn 0.2s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .step-header {
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 4px;
            border-bottom: 2px solid #e2e8f0;
            width: 100%;
            text-align: center;
            padding-bottom: 2px;
        }

        .frame-box {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.875rem;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
            background: #f8fafc;
            font-family: monospace;
        }

        .frame-box.hit {
            background: #eff6ff;
            border-color: #93c5fd;
            color: #1e40af;
        }

        .frame-box.fault {
            background: #fef2f2;
            border-color: #fca5a5;
            color: #991b1b;
        }

        .frame-box.new {
            background: #f0fdf4;
            border-color: #86efac;
            color: #166534;
        }

        .algo-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            margin-top: 16px;
        }

        .stats {
            display: flex;
            gap: 16px;
            font-size: 0.875rem;
            padding: 12px 16px;
            background: #f8fafc;
            border-top: 1px solid #e2e8f0;
            border-bottom-left-radius: 8px;
            border-bottom-right-radius: 8px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-val {
            font-weight: 600;
            font-family: monospace;
        }
    </style>
</head>

<body>

    <div class="panel p-4 mb-4">
        <div class="flex flex-col md:flex-row gap-4 items-end justify-between">
            <div class="flex-1 w-full relative">
                <label class="input-label">Reference String</label>
                <input type="text" id="ref-input" class="input-text" value="1, 2, 3, 4, 1, 2, 5, 1, 2, 3, 4, 5" />
            </div>
            <div class="w-full md:w-32">
                <label class="input-label">Frames</label>
                <select id="frame-input" class="select-sm w-full">
                    <option value="3" selected>3 Frames</option>
                    <option value="4">4 Frames</option>
                    <option value="5">5 Frames</option>
                </select>
            </div>
            <div class="w-full md:w-32">
                <button id="btn-start" class="btn" onclick="startSim()">Run Simulation</button>
            </div>
        </div>
    </div>

    <div class="algo-grid">
        <!-- FIFO -->
        <div class="panel">
            <div class="panel-header">
                <span class="text-slate-700">FIFO</span>
                <span class="mono text-xs text-slate-400" id="fifo-status">waiting</span>
            </div>
            <div class="px-4 history-container" id="fifo-history"></div>
            <div class="stats">
                <div class="stat-item text-slate-500">Faults: <span class="stat-val text-red-600"
                        id="fifo-faults">0</span></div>
                <div class="stat-item text-slate-500">Hits: <span class="stat-val text-blue-600" id="fifo-hits">0</span>
                </div>
            </div>
        </div>

        <!-- LRU -->
        <div class="panel">
            <div class="panel-header">
                <span class="text-slate-700">LRU</span>
                <span class="mono text-xs text-slate-400" id="lru-status">waiting</span>
            </div>
            <div class="px-4 history-container" id="lru-history"></div>
            <div class="stats">
                <div class="stat-item text-slate-500">Faults: <span class="stat-val text-red-600"
                        id="lru-faults">0</span></div>
                <div class="stat-item text-slate-500">Hits: <span class="stat-val text-blue-600" id="lru-hits">0</span>
                </div>
            </div>
        </div>

        <!-- OPTIMAL -->
        <div class="panel">
            <div class="panel-header">
                <span class="text-slate-700">Optimal</span>
                <span class="mono text-xs text-slate-400" id="opt-status">waiting</span>
            </div>
            <div class="px-4 history-container" id="opt-history"></div>
            <div class="stats">
                <div class="stat-item text-slate-500">Faults: <span class="stat-val text-red-600"
                        id="opt-faults">0</span></div>
                <div class="stat-item text-slate-500">Hits: <span class="stat-val text-blue-600" id="opt-hits">0</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        class Algorithm {
            constructor(framesCount, type) {
                this.maxFrames = framesCount;
                this.type = type;
                this.frames = [];
                this.faults = 0;
                this.hits = 0;
                this.time = 0;
                this.queue = [];
                this.fullRef = [];
            }

            process(page, nextRefIndex) {
                this.time++;
                let hit = false;
                let victimIdx = -1;
                let isFull = this.frames.length >= this.maxFrames;

                let existingIdx = this.frames.findIndex((f) => f.page === page);
                if (existingIdx !== -1) {
                    hit = true;
                    this.hits++;
                    if (this.type === "lru") this.frames[existingIdx].time = this.time;
                } else {
                    this.faults++;
                    if (!isFull) {
                        this.frames.push({ page: page, time: this.time });
                        if (this.type === "fifo") this.queue.push(page);
                    } else {
                        if (this.type === "fifo") {
                            let victimPage = this.queue.shift();
                            victimIdx = this.frames.findIndex((f) => f.page === victimPage);
                            this.frames[victimIdx] = { page: page, time: this.time };
                            this.queue.push(page);
                        } else if (this.type === "lru") {
                            let lruIdx = 0;
                            for (let i = 1; i < this.frames.length; i++) {
                                if (this.frames[i].time < this.frames[lruIdx].time) lruIdx = i;
                            }
                            victimIdx = lruIdx;
                            this.frames[victimIdx] = { page: page, time: this.time };
                        } else if (this.type === "opt") {
                            let farthestDist = -1;
                            let optIdx = 0;
                            for (let i = 0; i < this.frames.length; i++) {
                                let currPage = this.frames[i].page;
                                let futureSlice = this.fullRef.slice(nextRefIndex);
                                let dist = futureSlice.indexOf(currPage);
                                if (dist === -1) { optIdx = i; break; }
                                if (dist > farthestDist) { farthestDist = dist; optIdx = i; }
                            }
                            victimIdx = optIdx;
                            this.frames[victimIdx] = { page: page, time: this.time };
                        }
                    }
                }
                return { hit, victimIdx };
            }
        }

        function renderColumn(containerId, frames, maxFrames, res, reqPage) {
            const container = document.getElementById(containerId);
            const col = document.createElement("div");
            col.className = "col";

            const header = document.createElement("div");
            header.className = "step-header mono";
            header.textContent = reqPage;
            header.style.color = res.hit ? "#2563eb" : "#dc2626";
            header.style.borderColor = res.hit ? "#bfdbfe" : "#fecaca";
            col.appendChild(header);

            for (let i = 0; i < maxFrames; i++) {
                const fDiv = document.createElement("div");
                fDiv.className = "frame-box";
                if (i < frames.length) {
                    fDiv.textContent = frames[i].page;
                    if (res.hit && frames[i].page === reqPage) fDiv.classList.add("hit");
                    else if (!res.hit && (res.victimIdx === i || (res.victimIdx === -1 && i === frames.length - 1))) fDiv.classList.add("new");
                }
                col.appendChild(fDiv);
            }
            container.appendChild(col);
            container.scrollLeft = container.scrollWidth;
        }

        async function startSim() {
            const btn = document.getElementById("btn-start");
            btn.disabled = true;
            btn.textContent = "Running...";

            const refs = document.getElementById("ref-input").value.split(",").map(x => x.trim()).filter(x => x !== "");
            const fCount = parseInt(document.getElementById("frame-input").value);

            const algos = ['fifo', 'lru', 'opt'];
            const instances = {
                fifo: new Algorithm(fCount, "fifo"),
                lru: new Algorithm(fCount, "lru"),
                opt: new Algorithm(fCount, "opt")
            };
            instances.opt.fullRef = refs;

            algos.forEach(a => {
                document.getElementById(`${a}-history`).innerHTML = "";
                document.getElementById(`${a}-status`).textContent = "processing...";
                document.getElementById(`${a}-faults`).textContent = "0";
                document.getElementById(`${a}-hits`).textContent = "0";
            });

            const sleep = ms => new Promise(r => setTimeout(r, ms));

            for (let i = 0; i < refs.length; i++) {
                const page = refs[i];

                await sleep(300); // Animation delay between steps

                algos.forEach(a => {
                    const instance = instances[a];
                    const res = instance.process(page, i + 1);
                    renderColumn(`${a}-history`, instance.frames, fCount, { hit: res.hit, victimIdx: res.victimIdx }, page);

                    document.getElementById(`${a}-faults`).textContent = instance.faults;
                    document.getElementById(`${a}-hits`).textContent = instance.hits;
                });
            }

            algos.forEach(a => {
                document.getElementById(`${a}-status`).textContent = "completed";
            });

            btn.disabled = false;
            btn.textContent = "Run Simulation";
        }

        // Run once on load
        window.onload = startSim;
    </script>
</body>

</html>
