    <script>
      (function (l) {
        if (l.search[1] === "/") {
          const decoded = l.search
            .slice(1)
            .split("&")
            .map((part) => part.replace(/~and~/g, "&"))
            .join("?");

          window.history.replaceState(
            null,
            "",
            l.pathname.slice(0, -1) + decoded + l.hash,
          );
        }
      })(window.location);
    </script>

    <script>
      (function () {
        var stored = localStorage.getItem("theme");
        var validThemes = ["light", "dark", "system", "terminal"];
        var defaultTheme =
          document.querySelector('meta[name="theme-default"]')?.content ??
          "light";
        var theme = validThemes.indexOf(stored) !== -1 ? stored : defaultTheme;
        var prefersDark = window.matchMedia(
          "(prefers-color-scheme: dark)",
        ).matches;
        var root = document.documentElement;
        root.classList.remove("light", "dark", "terminal");

        if (theme === "terminal") {
          // Terminal uses dark as base with additional terminal class
          root.classList.add("dark", "terminal");
        } else if (theme === "dark" || (theme === "system" && prefersDark)) {
          root.classList.add("dark");
        } else if (theme === "system") {
          root.classList.add("light");
        } else {
          // "light" or explicit known theme
          root.classList.add(theme);
        }
      })();
    </script>
