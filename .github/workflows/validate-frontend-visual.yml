name: Validate Frontend Visual Smoke

on:
  pull_request:
    paths:
      - 'frontend/**'
      - 'shared/**'
      - '.github/workflows/validate-frontend-visual.yml'

jobs:
  playwright-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        env:
          VITE_API_BASE_URL: https://api.nodove.com
          VITE_CHAT_BASE_URL: https://api.nodove.com
          VITE_FEATURE_AI_ENABLED: "true"
          VITE_FEATURE_RAG_ENABLED: "true"
          VITE_FEATURE_AI_INLINE: "true"
          VITE_FEATURE_COMMENTS_ENABLED: "true"
        run: npm --prefix frontend run build

      - name: Start preview server
        working-directory: frontend
        run: npm run preview -- --host 127.0.0.1 --port 4173 > /tmp/frontend-preview.log 2>&1 &

      - name: Wait for preview server
        run: |
          set -euo pipefail
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:4173 >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/frontend-preview.log
          exit 1

      - name: Run Playwright smoke tests
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:4173
          PLAYWRIGHT_API_BASE: https://api.nodove.com
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-playwright-artifacts
          path: |
            frontend/test-results
            frontend/verification-screenshots
