name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "frontend/public/project-data/**"
      - "shared/**"
      - ".github/workflows/deploy.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - "frontend/public/project-data/**"
      - "shared/**"
      - ".github/workflows/deploy.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SITE_BASE_URL: https://noblog.nodove.com
      VITE_SITE_BASE_URL: https://noblog.nodove.com
      # Unified backend base URL (e.g., https://api.nodove.com or https://your-server:5080)
      # Configure this as a repository secret named VITE_API_BASE_URL
      VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
      VITE_CHAT_BASE_URL: ${{ secrets.VITE_CHAT_BASE_URL }}
      VITE_CHAT_API_KEY: ${{ secrets.VITE_CHAT_API_KEY }}
      # Feature flags for frontend (configure as repository secrets)
      # Set VITE_FEATURE_FAB to 'true' to enable FAB by default
      VITE_FEATURE_FAB: ${{ secrets.VITE_FEATURE_FAB }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            frontend/package-lock.json

      - name: Install dependencies (frontend)
        run: npm --prefix frontend ci

      - name: Type-check (frontend)
        run: npm --prefix frontend run type-check

      - name: Lint (frontend)
        run: npm --prefix frontend run lint

      - name: Test (frontend)
        run: npm --prefix frontend run test:run

      - name: Organize images (move to proper directories)
        run: |
          chmod +x ./scripts/organize-images.sh
          ./scripts/organize-images.sh

      - name: Generate manifests (frontend)
        run: npm --prefix frontend run generate-manifests

      - name: Generate projects manifest (frontend)
        run: npm --prefix frontend run generate-projects-manifest

      - name: Generate SEO files (frontend)
        run: npm --prefix frontend run generate-seo

      - name: Build (frontend)
        run: npm --prefix frontend run build

      - name: Bundle size report
        run: |
          if [ ! -d frontend/dist/assets ]; then
            echo "frontend/dist/assets not found; skipping bundle size report"
            exit 0
          fi
          echo "=== JS chunk sizes (raw) ==="
          find frontend/dist/assets -name "*.js" -print0 | xargs -0 -r du -h | sort -rh | head -20
          echo "=== Total JS ==="
          find frontend/dist/assets -name "*.js" -print0 | xargs -0 -r du -ch | tail -1
          echo "=== Total CSS ==="
          find frontend/dist/assets -name "*.css" -print0 | xargs -0 -r du -ch | tail -1

      - name: Setup Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v4

      - name: Upload artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./frontend/dist"

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Skip deployment for pull requests
        if: github.event_name == 'pull_request'
        run: echo "GitHub Pages deployment is skipped for pull_request events."

      - name: Deploy to GitHub Pages
        if: github.event_name != 'pull_request'
        id: deployment
        uses: actions/deploy-pages@v4
