name: Validate Backend

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'shared/**'
      - '.github/workflows/validate-backend.yml'

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        run: npm test

  terminal-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/terminal-server/package-lock.json

      - name: Install terminal-server dependencies
        working-directory: backend/terminal-server
        run: npm ci

      - name: Run terminal-server tests
        working-directory: backend/terminal-server
        run: npm test

      - name: Build terminal-server
        working-directory: backend/terminal-server
        run: npm run build
