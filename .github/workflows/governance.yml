name: Governance Checks

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'workers/**'
      - 'shared/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/governance.yml'

jobs:
  contracts-and-routes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Check contract drift
        run: npm run contracts:check

      - name: Check route governance
        run: npm run routes:check

      - name: Check orphan backend routes
        run: npm run routes:check:orphans

  outbox-memory:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Check memory embedding outbox
        run: npm run outbox:check-memory
