name: Deploy Cloudflare Workers

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'workers/**'
      - 'shared/**'
      - 'scripts/worker-deploy-matrix.mjs'
      - '.github/workflows/deploy-workers.yml'

permissions:
  contents: read

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build deploy matrix
        id: matrix
        run: echo "matrix=$(node scripts/worker-deploy-matrix.mjs)" >> "$GITHUB_OUTPUT"

  deploy-workers:
    needs: build-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.build-matrix.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.cacheDependencyPath }}
          cache-dependency-path: ${{ matrix.cacheDependencyPath }}

      - name: Install dependencies
        working-directory: workers/${{ matrix.path }}
        run: npm ci

      - name: Verify worker quality gates
        working-directory: workers/${{ matrix.path }}
        run: |
          node -e "const p=require('./package.json'); if(!p.scripts?.typecheck) process.exit(1)"
          node -e "const p=require('./package.json'); if(!p.scripts?.test) process.exit(1)"

      - name: Type-check worker
        working-directory: workers/${{ matrix.path }}
        run: npm run typecheck

      - name: Run worker tests
        working-directory: workers/${{ matrix.path }}
        run: npm run test

      - name: Deploy worker
        working-directory: workers/${{ matrix.path }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --env production
