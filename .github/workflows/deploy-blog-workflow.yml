name: Build Blog Backend Images

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'shared/**'
      - '.github/workflows/deploy-blog-workflow.yml'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Custom image tag (default: git SHA)'
        required: false
        default: ''

permissions:
  contents: read
  packages: write

concurrency:
  group: backend-build-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.vars.outputs.sha_short }}
      sha_short: ${{ steps.vars.outputs.sha_short }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            backend/terminal-server/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        run: npm test

      - name: Install terminal-server dependencies
        working-directory: backend/terminal-server
        run: npm ci

      - name: Run terminal-server tests
        working-directory: backend/terminal-server
        run: npm test

      - name: Build terminal-server
        working-directory: backend/terminal-server
        run: npm run build

      - name: Set up variables
        id: vars
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "sha_short=${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "SHA Short: ${SHA_SHORT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta - Blog API
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/blog-api
          tags: |
            type=raw,value=${{ steps.vars.outputs.sha_short }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ github.event.inputs.image_tag }},enable=${{ github.event.inputs.image_tag != '' }}

      - name: Build and push Blog API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

      - name: Build and push Terminal Server
        uses: docker/build-push-action@v5
        with:
          context: ./backend/terminal-server
          file: ./backend/terminal-server/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/blog-terminal:${{ steps.vars.outputs.sha_short }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/blog-terminal:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

  notify:
    name: Build Complete
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: success()

    steps:
      - name: Build summary
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║              BUILD COMPLETED SUCCESSFULLY                  ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          echo "Images pushed to GHCR:"
          echo "  - ghcr.io/${{ github.repository_owner }}/blog-api:${{ needs.build-and-push.outputs.sha_short }}"
          echo "  - ghcr.io/${{ github.repository_owner }}/blog-api:latest"
          echo "  - ghcr.io/${{ github.repository_owner }}/blog-terminal:${{ needs.build-and-push.outputs.sha_short }}"
          echo "  - ghcr.io/${{ github.repository_owner }}/blog-terminal:latest"
          echo ""
          echo "┌────────────────────────────────────────────────────────────┐"
          echo "│ GITOPS DEPLOYMENT SUMMARY                                  │"
          echo "├────────────────────────────────────────────────────────────┤"
          echo "│ Argo CD watches the k3s directory in this repository.      │"
          echo "│                                                            │"
          echo "│ Argo CD Image Updater selects immutable SHA tags for       │"
          echo "│ blog-api and blog-terminal, then Argo CD auto-syncs.      │"
          echo "│                                                            │"
          echo "│ Expected lag: registry publish + updater scan + sync.      │"
          echo "│ No manual kubectl rollout restart is required.             │"
          echo "└────────────────────────────────────────────────────────────┘"
