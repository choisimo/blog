name: Validate k3s Manifests

on:
  pull_request:
    paths:
      - 'k3s/**'
      - '.github/workflows/validate-k3s.yml'

jobs:
  render-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.31.0'

      - name: Install kubeconform
        run: |
          set -euo pipefail
          curl -L https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz -o /tmp/kubeconform.tar.gz
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp kubeconform
          sudo mv /tmp/kubeconform /usr/local/bin/kubeconform

      - name: Render base manifests
        run: kubectl kustomize k3s > /tmp/k3s-base.yaml

      - name: Validate base manifests
        run: kubeconform -strict -ignore-missing-schemas -summary /tmp/k3s-base.yaml

      - name: Render optional terminal manifests
        run: kubectl kustomize k3s/optional/terminal > /tmp/k3s-terminal.yaml

      - name: Check terminal feature flag separation
        run: |
          grep -q 'FEATURE_TERMINAL_ENABLED: "false"' k3s/configmap.yaml
          grep -q 'FEATURE_TERMINAL_ENABLED: "true"' k3s/optional/terminal/configmap-patch.yaml
          ! grep -q 'name: terminal-server' /tmp/k3s-base.yaml
          grep -q 'name: terminal-server' /tmp/k3s-terminal.yaml

      - name: Validate optional terminal manifests
        run: kubeconform -strict -ignore-missing-schemas -summary /tmp/k3s-terminal.yaml
