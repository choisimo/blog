name: noblog_admin_flutter
version: 1.0.0+1
publish_to: "none"
description: Flutter admin console for the blog-main admin surface.

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  http_parser: ^4.0.2
  shared_preferences: ^2.3.2
  flutter_markdown: ^0.7.4
  file_picker: ^8.1.2
  url_launcher: ^6.3.0
  intl: ^0.19.0
  uuid: ^4.5.1
  flutter_secure_storage: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
